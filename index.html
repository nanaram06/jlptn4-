<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>JLPT N4 단어 퀴즈</title>
  <style>
    :root{
      --bg:#fff7f3; --card:#fff; --line:#f1d5c9; --text:#222; --muted:#666;
      --accent:#f97316; --good:#16a34a; --bad:#dc2626;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:20px 16px calc(40px + env(safe-area-inset-bottom))}
    h1{margin:0 0 16px;font-size:1.6rem}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .tab-btn,button,select{
      border-radius:14px;border:1px solid var(--line);min-height:48px;font-size:1rem;
      touch-action:manipulation;-webkit-appearance:none;appearance:none;
    }
    .tab-btn{background:#fff;font-weight:700;cursor:pointer}
    .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .panel{display:none}.panel.active{display:block}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
    .row{display:grid;gap:10px}.row.controls{grid-template-columns:1fr}
    label{display:block;font-size:.92rem;color:var(--muted);margin-bottom:6px}
    select,button{width:100%;padding:0 12px;background:#fff}
    button{cursor:pointer;font-weight:700}
    .primary{background:var(--accent);color:#fff;border-color:var(--accent)}
    .secondary{background:#fff;color:var(--text)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .chip{background:#fff3ed;color:var(--accent);border-radius:999px;padding:8px 12px;font-size:.9rem;font-weight:700}
    .question-area{text-align:center;padding:14px 8px}
    .question{font-size:2rem;font-weight:800;line-height:1.5;margin:6px 0}
    .reading{color:var(--muted);min-height:1.6em;margin-bottom:10px}
    .choices{display:grid;gap:10px}
    .choice{text-align:left;padding:12px 14px}
    .choice.correct{border-color:#bbf7d0;background:#ecfdf5;color:#166534}
    .choice.wrong{border-color:#fecaca;background:#fef2f2;color:#991b1b}
    .result{min-height:1.5em;margin-top:12px;font-weight:700;text-align:center}
    .result.good{color:var(--good)} .result.bad{color:var(--bad)}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .vocab-toolbar{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}
    .vocab-list,.wrong-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .vocab-item,.wrong-item{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
    .vocab-day,.wrong-day{color:var(--muted);font-size:.85rem;margin-bottom:6px}
    .vocab-jp,.wrong-jp{font-size:1.08rem;font-weight:800;line-height:1.8}
    .vocab-kr,.wrong-kr{color:var(--muted);margin-top:4px}
    .section-title{font-weight:800;margin-bottom:10px}
    .empty{color:var(--muted);text-align:center;padding:12px 0}
    .toggle-row{display:flex;justify-content:center;align-items:center;margin-bottom:10px}
    .toggle-label{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:.95rem;user-select:none}
    .toggle-label input{width:18px;height:18px}
    ruby{ruby-position:over}
    rt{font-size:.52em;color:var(--muted)}
    @media (min-width:700px){.row.controls{grid-template-columns:1fr 1fr 1fr 1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>JLPT N4 단어 퀴즈</h1>

    <div class="tabs" style="grid-template-columns:1fr 1fr 1fr;">
      <button class="tab-btn active" id="quizTabBtn" type="button">퀴즈</button>
      <button class="tab-btn" id="vocabTabBtn" type="button">단어</button>
      <button class="tab-btn" id="wrongTabBtn" type="button">오답</button>
    </div>

    <section class="panel active" id="quizPanel">
      <div class="card">
        <div class="row controls">
          <div>
            <label for="daySelect">DAY</label>
            <select id="daySelect"></select>
          </div>
          <div>
            <label for="modeSelect">형식</label>
            <select id="modeSelect">
              <option value="jpToKr">일본어 → 뜻</option>
              <option value="krToJp">뜻 → 일본어</option>
            </select>
          </div>
          <div>
            <label for="countSelect">문제 수</label>
            <select id="countSelect">
              <option value="10" selected>10</option>
              <option value="20">20</option>
              <option value="30">30</option>
              <option value="all">전체</option>
            </select>
          </div>
          <div>
            <label>&nbsp;</label>
            <button class="primary" id="startBtn" type="button">시작</button>
          </div>
        </div>
        <div class="chips">
          <div class="chip" id="progressChip">0 / 0</div>
          <div class="chip" id="scoreChip">0점</div>
          <div class="chip" id="dayCountChip">0단어</div>
          <div class="chip" id="wrongCountChip">오답 0개</div>
          <div class="chip" id="wrongCountChip">오답 0개</div>
        </div>
      </div>

      <div class="card">
        <div class="question-area">
          <div class="question" id="questionText">시작</div>
          <div class="reading" id="readingText"></div>
        </div>
        <div class="toggle-row">
          <label class="toggle-label" for="showYomiCheckbox">
            <input type="checkbox" id="showYomiCheckbox" />
            <span>요미가나 보기</span>
          </label>
        </div>
        <div class="choices" id="choices"></div>
        <div class="result" id="resultText"></div>
        <div class="actions">
          <button class="secondary" id="nextBtn" type="button">다음</button>
          <button class="secondary" id="revealAnswerBtn" type="button">정답 보기</button>
        </div>
      </div>
    </section>

    <section class="panel" id="wrongPanel">
      <div class="card">
        <div class="section-title">오답만 보기</div>
        <div style="margin-bottom:12px;">
          <button class="secondary" id="wrongTabClearBtn" type="button">오답 비우기</button>
        </div>
        <div class="wrong-list" id="wrongOnlyList"></div>
      </div>
    </section>

    <section class="panel" id="vocabPanel">
      <div class="card">
        <div class="vocab-toolbar">
          <div>
            <label for="vocabDaySelect">DAY</label>
            <select id="vocabDaySelect"></select>
          </div>
        </div>
        <div class="vocab-list" id="vocabList"></div>
      </div>
    </section>
  </div>

    const quizTabBtn = document.getElementById("quizTabBtn");
    const vocabTabBtn = document.getElementById("vocabTabBtn");
    const wrongTabBtn = document.getElementById("wrongTabBtn");
    const quizPanel = document.getElementById("quizPanel");
    const vocabPanel = document.getElementById("vocabPanel");
    const wrongPanel = document.getElementById("wrongPanel");
    const daySelect = document.getElementById("daySelect");
    const vocabDaySelect = document.getElementById("vocabDaySelect");
    const modeSelect = document.getElementById("modeSelect");
    const countSelect = document.getElementById("countSelect");
    const startBtn = document.getElementById("startBtn");
    const questionText = document.getElementById("questionText");
    const readingText = document.getElementById("readingText");
    const choices = document.getElementById("choices");
    const resultText = document.getElementById("resultText");
    const nextBtn = document.getElementById("nextBtn");
    const revealAnswerBtn = document.getElementById("revealAnswerBtn");
    const wrongTabClearBtn = document.getElementById("wrongTabClearBtn");
    const showYomiCheckbox = document.getElementById("showYomiCheckbox");
    const progressChip = document.getElementById("progressChip");
    const scoreChip = document.getElementById("scoreChip");
    const dayCountChip = document.getElementById("dayCountChip");
    const wrongCountChip = document.getElementById("wrongCountChip");
    const vocabList = document.getElementById("vocabList");
    const wrongOnlyList = document.getElementById("wrongOnlyList");

    const dayKeys = Object.keys(DATA);
    let quizItems = [];
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let currentChoices = [];
    let wrongItems = [];

    function bindPress(el, handler) {
      let touched = false;
      el.addEventListener("touchend", (e) => {
        e.preventDefault();
        touched = true;
        handler(e);
        setTimeout(() => { touched = false; }, 400);
      }, { passive: false });
      el.addEventListener("click", (e) => {
        if (touched) return;
        handler(e);
      });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function isKanji(ch) {
      return /[一-龯々]/.test(ch);
    }

    function tokenizeWord(jp) {
      const parts = [];
      let current = "";
      let currentType = null;
      for (const ch of jp) {
        const type = isKanji(ch) ? "kanji" : "other";
        if (type !== currentType && current) {
          parts.push({ type: currentType, text: current });
          current = ch;
          currentType = type;
        } else {
          current += ch;
          currentType = type;
        }
      }
      if (current) parts.push({ type: currentType, text: current });
      return parts;
    }

    function rubyText(jp, yomi, visible) {
      if (!visible || !yomi) return escapeHtml(jp);
      if (![...jp].some(isKanji)) return escapeHtml(jp);

      const parts = tokenizeWord(jp);
      let cursor = 0;
      let html = "";

      for (let i = 0; i < parts.length; i++) {
        const part = parts[i];

        if (part.type === "other") {
          html += escapeHtml(part.text);
          const idx = yomi.indexOf(part.text, cursor);
          if (idx !== -1) cursor = idx + part.text.length;
          continue;
        }

        let nextOther = "";
        for (let j = i + 1; j < parts.length; j++) {
          if (parts[j].type === "other") {
            nextOther = parts[j].text;
            break;
          }
        }

        let reading = "";
        if (nextOther) {
          const idx = yomi.indexOf(nextOther, cursor);
          reading = idx === -1 ? yomi.slice(cursor) : yomi.slice(cursor, idx);
          cursor = idx === -1 ? yomi.length : idx;
        } else {
          reading = yomi.slice(cursor);
          cursor = yomi.length;
        }

        html += reading
          ? `<ruby>${escapeHtml(part.text)}<rt>${escapeHtml(reading)}</rt></ruby>`
          : escapeHtml(part.text);
      }

      return html;
    }

    function fillDaySelect(select) {
      const previous = select.value || "all";
      select.innerHTML = "";

      const allCount = dayKeys.reduce((sum, day) => sum + (DATA[day] || []).length, 0);

      const all = document.createElement("option");
      all.value = "all";
      all.textContent = `전체 (${allCount})`;
      select.appendChild(all);

      if (select.id === "daySelect") {
        const wrongOnly = document.createElement("option");
        wrongOnly.value = "wrongOnly";
        wrongOnly.textContent = `오답만 (${wrongItems.length})`;
        select.appendChild(wrongOnly);
      }

      dayKeys.forEach(day => {
        const count = (DATA[day] || []).length;
        const op = document.createElement("option");
        op.value = day;
        op.textContent = `${day.toUpperCase()} (${count})`;
        select.appendChild(op);
      });

      const values = [...select.options].map(o => o.value);
      select.value = values.includes(previous) ? previous : "all";
    }

    function getItems(selectedDay) {
      if (selectedDay === "all") {
        return dayKeys.flatMap(day => DATA[day].map(item => ({ ...item, day })));
      }
      if (selectedDay === "wrongOnly") {
        return wrongItems.map(item => ({ ...item }));
      }
      return (DATA[selectedDay] || []).map(item => ({ ...item, day: selectedDay }));
    }

    function switchTab(tab) {
      const isQuiz = tab === "quiz";
      const isVocab = tab === "vocab";
      const isWrong = tab === "wrong";
      quizPanel.classList.toggle("active", isQuiz);
      vocabPanel.classList.toggle("active", isVocab);
      wrongPanel.classList.toggle("active", isWrong);
      quizTabBtn.classList.toggle("active", isQuiz);
      vocabTabBtn.classList.toggle("active", isVocab);
      wrongTabBtn.classList.toggle("active", isWrong);
      if (isVocab) renderVocab();
      if (isWrong) renderWrongOnlyList();
    }

    function sameItem(a, b) {
      return a.day === b.day && a.jp === b.jp && a.kr === b.kr;
    }

    function addWrongItem(item) {
      if (!wrongItems.some(x => sameItem(x, item))) wrongItems.push(item);
      renderWrongOnlyList();
      updateStatus();
    }

    function buildWrongCards(targetEl) {
      targetEl.innerHTML = "";
      if (!wrongItems.length) {
        targetEl.innerHTML = '<div class="empty">오답 없음</div>';
        return;
      }
      wrongItems.forEach(item => {
        const div = document.createElement("div");
        div.className = "wrong-item";
        div.innerHTML = `
          <div class="wrong-day">${item.day.toUpperCase()}</div>
          <div class="wrong-jp">${rubyText(item.jp, item.yomi, true)}</div>
          <div class="wrong-kr">${escapeHtml(item.kr)}</div>
        `;
        targetEl.appendChild(div);
      });
    }

    function renderWrongOnlyList() {
      buildWrongCards(wrongOnlyList);
    }

    function updateStatus() {
      fillDaySelect(daySelect);
      progressChip.textContent = `${quizItems.length ? Math.min(currentIndex + 1, quizItems.length) : 0} / ${quizItems.length}`;
      scoreChip.textContent = `${score}점`;
      const selected = daySelect.value || "all";
      const currentCount = getItems(selected).length;
      dayCountChip.textContent = `${currentCount}단어`;
      wrongCountChip.textContent = `오답 ${wrongItems.length}개`;
    }

    function renderVocab() {
      const items = getItems(vocabDaySelect.value);
      vocabList.innerHTML = "";
      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "vocab-item";
        div.innerHTML = `
          <div class="vocab-day">${item.day.toUpperCase()}</div>
          <div class="vocab-jp">${rubyText(item.jp, item.yomi, true)}</div>
          <div class="vocab-kr">${escapeHtml(item.kr)}</div>
        `;
        vocabList.appendChild(div);
      });
      updateStatus();
    }

    function makeChoices(answerItem) {
      if (modeSelect.value === "jpToKr") {
        const pool = getItems(daySelect.value).filter(x => x.kr !== answerItem.kr);
        const wrongs = shuffle(pool).slice(0, 3).map(x => ({ text: x.kr, correct: false }));
        return shuffle([{ text: answerItem.kr, correct: true }, ...wrongs]);
      } else {
        const pool = getItems(daySelect.value).filter(x => x.jp !== answerItem.jp);
        const wrongs = shuffle(pool).slice(0, 3).map(x => ({ text: x.jp, yomi: x.yomi, correct: false }));
        return shuffle([{ text: answerItem.jp, yomi: answerItem.yomi, correct: true }, ...wrongs]);
      }
    }

    function renderQuestion() {
      choices.innerHTML = "";
      resultText.textContent = "";
      resultText.className = "result";
      showYomiCheckbox.checked = false;

      if (!quizItems.length) {
        questionText.textContent = "시작";
        readingText.textContent = "";
        updateStatus();
        return;
      }

      if (currentIndex >= quizItems.length) {
        questionText.textContent = "완료";
        readingText.textContent = `${score} / ${quizItems.length}`;
        choices.innerHTML = "";
        updateStatus();
        return;
      }

      const item = quizItems[currentIndex];
      answered = false;
      currentChoices = makeChoices(item);

      if (modeSelect.value === "jpToKr") {
        questionText.innerHTML = rubyText(item.jp, item.yomi, false);
      } else {
        questionText.textContent = item.kr;
      }
      readingText.textContent = item.day.toUpperCase();

      currentChoices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice secondary";
        btn.type = "button";
        btn.innerHTML = modeSelect.value === "jpToKr"
          ? escapeHtml(choice.text)
          : rubyText(choice.text, choice.yomi, false);

        bindPress(btn, () => {
          if (answered) return;
          answered = true;

          if (choice.correct) {
            btn.classList.add("correct");
            resultText.textContent = "정답";
            resultText.className = "result good";
            score += 1;
          } else {
            btn.classList.add("wrong");
            resultText.textContent = "오답";
            resultText.className = "result bad";
            addWrongItem(item);
          }

          [...choices.children].forEach((el, idx) => {
            if (currentChoices[idx].correct) el.classList.add("correct");
          });

          updateStatus();
        });

        choices.appendChild(btn);
      });

      updateStatus();
    }

    function startQuiz() {
      const items = shuffle(getItems(daySelect.value));
      const selectedCount = countSelect.value;
      if (selectedCount === "all") {
        quizItems = items;
      } else {
        const limit = Number(selectedCount);
        quizItems = items.slice(0, limit);
      }
      currentIndex = 0;
      score = 0;
      renderQuestion();
    }

    function applyYomiState() {
      if (!quizItems.length || currentIndex >= quizItems.length) return;
      const item = quizItems[currentIndex];
      const visible = showYomiCheckbox.checked;

      if (modeSelect.value === "jpToKr") {
        questionText.innerHTML = rubyText(item.jp, item.yomi, visible);
      } else {
        [...choices.children].forEach((btn, idx) => {
          const choice = currentChoices[idx];
          btn.innerHTML = rubyText(choice.text, choice.yomi, visible);
        });
      }
    }

    function revealAnswer() {
      if (!quizItems.length || currentIndex >= quizItems.length || answered) return;
      const item = quizItems[currentIndex];
      const correctValue = modeSelect.value === "jpToKr" ? item.kr : item.jp;

      [...choices.children].forEach((el, idx) => {
        const choice = currentChoices[idx];
        if (choice.text === correctValue) el.classList.add("correct");
      });

      addWrongItem(item);
      resultText.textContent = "오답";
      resultText.className = "result bad";
      answered = true;
    }

    function nextQuestion() {
      if (!quizItems.length) return;
      if (!answered && currentIndex < quizItems.length) {
        addWrongItem(quizItems[currentIndex]);
        resultText.textContent = "미응답 오답 처리";
        resultText.className = "result bad";
      }
      currentIndex += 1;
      renderQuestion();
    }

    function clearWrong() {
      wrongItems = [];
      renderWrongOnlyList();
      updateStatus();
    }

    bindPress(startBtn, startQuiz);
    bindPress(quizTabBtn, () => switchTab("quiz"));
    bindPress(vocabTabBtn, () => switchTab("vocab"));
    bindPress(wrongTabBtn, () => switchTab("wrong"));
    bindPress(nextBtn, nextQuestion);
    bindPress(revealAnswerBtn, revealAnswer);
    bindPress(wrongTabClearBtn, clearWrong);
    showYomiCheckbox.addEventListener("change", applyYomiState);
    daySelect.addEventListener("change", updateStatus);
    countSelect.addEventListener("change", updateStatus);
    vocabDaySelect.addEventListener("change", renderVocab);

    fillDaySelect(daySelect);
    fillDaySelect(vocabDaySelect);
